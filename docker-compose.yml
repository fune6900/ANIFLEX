version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: aniflex-dev
    ports:
      - "3000:3000"
    volumes:
      # ソースコードのホットリロード
      - .:/app
      # node_modules はコンテナ内のものを使う
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - TMDB_API_KEY=${TMDB_API_KEY}
    env_file:
      - .env.local
    restart: unless-stopped
